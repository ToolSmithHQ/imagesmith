# Shared: Pick a file and perform an operation (crop/resize/compress/rotate/metadata)
# Required env vars: FILE_NAME, TOOL_ID, ACTION_ID
# Optional: PRESET_TEXT (for resize)
appId: com.toolsmithlabs.imagesmith
---
- launchApp
- extendedWaitUntil:
    visible:
      id: "tool-convert"
    timeout: 30000

- tapOn:
    id: ${TOOL_ID}
- tapOn:
    id: "btn-browse-files"
- waitForAnimationToEnd

- runFlow:
    file: ../pick_file.yaml
    env:
      FILE_NAME: ${FILE_NAME}
- waitForAnimationToEnd

# For resize: tap a preset first (button is disabled without changes)
- runFlow:
    when:
      visible: ${PRESET_TEXT}
    commands:
      - tapOn: ${PRESET_TEXT}

- extendedWaitUntil:
    visible:
      id: ${ACTION_ID}
    timeout: 15000
- tapOn:
    id: ${ACTION_ID}

- extendedWaitUntil:
    visible:
      id: "btn-save-to-gallery"
    timeout: 30000
- assertVisible:
    id: "btn-save-to-gallery"
