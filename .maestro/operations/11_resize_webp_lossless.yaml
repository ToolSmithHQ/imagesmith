# Test: Resize WEBP_LOSSLESS image
appId: com.toolsmithlabs.imagesmith
---
- launchApp
- extendedWaitUntil:
    visible:
      id: "tool-convert"
    timeout: 60000

- tapOn:
    id: "tool-resize"
- tapOn:
    id: "btn-browse-files"
- waitForAnimationToEnd

- runFlow:
    file: ../pick_file.yaml
    env:
      FILE_NAME: "webplossless.webp"
      FILE_NAME_IOS: "webplossless"
- waitForAnimationToEnd

- extendedWaitUntil:
    visible: "50%"
    timeout: 15000
- tapOn: "50%"

# Swipe up to reveal action button if below fold
- swipe:
    direction: UP
    duration: 400

- extendedWaitUntil:
    visible:
      id: "btn-resize"
    timeout: 15000
- tapOn:
    id: "btn-resize"

- extendedWaitUntil:
    visible:
      id: "btn-save-to-gallery"
    timeout: 30000
- assertVisible:
    id: "btn-save-to-gallery"
