# Test: Crop BMP image
appId: com.toolsmithlabs.imagesmith
---
- launchApp
- extendedWaitUntil:
    visible:
      id: "tool-convert"
    timeout: 60000

- tapOn:
    id: "tool-crop"
- tapOn:
    id: "btn-browse-files"
- waitForAnimationToEnd

- runFlow:
    file: ../pick_file.yaml
    env:
      FILE_NAME: "samplebmp.bmp"
      FILE_NAME_IOS: "samplebmp"
- waitForAnimationToEnd

# Swipe up to reveal action button if below fold
- swipe:
    direction: UP
    duration: 400

- extendedWaitUntil:
    visible:
      id: "btn-apply-crop"
    timeout: 15000
- tapOn:
    id: "btn-apply-crop"

- extendedWaitUntil:
    visible:
      id: "btn-save-to-gallery"
    timeout: 30000
- assertVisible:
    id: "btn-save-to-gallery"
